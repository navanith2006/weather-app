<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="cloud-snow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Snowflakes -->
  <g fill="#93C5FD">
    <circle class="snow snow-1" cx="22" cy="44" r="2" />
    <circle class="snow snow-2" cx="32" cy="47" r="2.5" />
    <circle class="snow snow-3" cx="42" cy="44" r="2" />
  </g>
  <!-- Cloud Body -->
  <path class="cloud" d="M18 32 C18 26.5 22.5 22 28 22 C33 22 37.2 25.7 37.9 30.5 C39.8 29.2 42 29 44 29.8 C47 31 49 34 49 37.5 C49 41.6 45.6 45 41.5 45 L18.5 45 C14.4 45 11 41.6 11 37.5 C11 33.8 13.7 30.7 17.3 30.2 C17.7 29.7 18 29.2 18 32 Z" fill="url(#cloud-snow-grad)" filter="url(#shadow)" />
  <style>
    .cloud {
      animation: float 6s ease-in-out infinite;
    }
    .snow {
      animation: drift-fall 2.5s ease-in-out infinite;
    }
    .snow-1 { animation-delay: 0s; }
    .snow-2 { animation-delay: 0.8s; }
    .snow-3 { animation-delay: 1.6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes drift-fall {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.8; }
      50% { transform: translateY(5px) translateX(2px); opacity: 1; }
      100% { transform: translateY(11px) translateX(0px); opacity: 0; }
    }
  </style>
</svg>
