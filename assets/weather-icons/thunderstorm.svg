<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="cloud-storm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Lightning Bolt -->
  <polygon class="lightning" points="30 40 22 50 29 50 25 60 37 46 30 46" fill="#F59E0B" />
  <!-- Rain Drops -->
  <g stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round" fill="none">
    <line class="rain rain-1" x1="18" y1="43" x2="15" y2="51" />
    <line class="rain rain-2" x1="44" y1="43" x2="41" y2="51" />
  </g>
  <!-- Cloud Body -->
  <path class="cloud" d="M18 32 C18 26.5 22.5 22 28 22 C33 22 37.2 25.7 37.9 30.5 C39.8 29.2 42 29 44 29.8 C47 31 49 34 49 37.5 C49 41.6 45.6 45 41.5 45 L18.5 45 C14.4 45 11 41.6 11 37.5 C11 33.8 13.7 30.7 17.3 30.2 C17.7 29.7 18 29.2 18 32 Z" fill="url(#cloud-storm-grad)" filter="url(#shadow)" />
  <style>
    .cloud {
      animation: float 6s ease-in-out infinite;
    }
    .lightning {
      transform-origin: 30px 46px;
      animation: flash-bolt 2s ease-out infinite;
    }
    .rain {
      stroke-dasharray: 4 8;
      animation: fall 1.2s linear infinite;
    }
    .rain-1 { animation-delay: 0.1s; }
    .rain-2 { animation-delay: 0.6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes flash-bolt {
      0%, 90%, 94%, 98%, 100% { opacity: 0; }
      92%, 96% { opacity: 1; fill: #FBBF24; }
    }
    @keyframes fall {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -12; }
    }
  </style>
</svg>
