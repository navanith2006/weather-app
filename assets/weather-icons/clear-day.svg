<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <radialGradient id="sun-gradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="60%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </radialGradient>
    <filter id="sun-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g class="animated-sun">
    <!-- Sun Rays -->
    <g stroke="url(#sun-gradient)" stroke-width="3.5" stroke-linecap="round" opacity="0.85">
      <line x1="32" y1="8" x2="32" y2="14" />
      <line x1="32" y1="50" x2="32" y2="56" />
      <line x1="8" y1="32" x2="14" y2="32" />
      <line x1="50" y1="32" x2="56" y2="32" />
      <line x1="15.03" y1="15.03" x2="19.27" y2="19.27" />
      <line x1="44.73" y1="44.73" x2="48.97" y2="48.97" />
      <line x1="15.03" y1="48.97" x2="19.27" y2="44.73" />
      <line x1="44.73" y1="15.03" x2="48.97" y2="19.27" />
    </g>
    <!-- Sun Core -->
    <circle cx="32" cy="32" r="12" fill="url(#sun-gradient)" filter="url(#sun-glow)" />
  </g>
  <style>
    .animated-sun {
      transform-origin: 32px 32px;
      animation: rotate-sun 30s linear infinite;
    }
    @keyframes rotate-sun {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</svg>
