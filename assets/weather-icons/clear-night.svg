<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="moon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>
    <filter id="moon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Twinkling Stars -->
  <g fill="#F1F5F9">
    <path class="star star-1" d="M14 14 l1.5 2.5 l2.5 1.5 l-2.5 1.5 l-1.5 2.5 l-1.5 -2.5 l-2.5 -1.5 l 2.5 -1.5 z" />
    <path class="star star-2" d="M48 14 l1 2 l2 1 l-2 1 l-1 2 l-1 -2 l-2 -1 l 2 -1 z" />
    <path class="star star-3" d="M42 46 l1.5 2.5 l2.5 1.5 l-2.5 1.5 l-1.5 2.5 l-1.5 -2.5 l-2.5 -1.5 l 2.5 -1.5 z" />
  </g>
  <!-- Moon Body -->
  <path class="moon" d="M23 12 C23 21 30 28.5 39 28.5 C42.2 28.5 45.2 27.6 47.7 26.2 C44.7 34.8 36.5 41 26.7 41 C15.3 41 6 31.7 6 20.3 C6 13.1 9.7 6.8 15.3 3.2 C13.4 5 12.2 7.6 12.2 10.4 C12.2 17.3 17 23 23 23" fill="url(#moon-gradient)" filter="url(#moon-glow)" />
  <style>
    .star {
      transform-origin: center;
      animation: twinkle 3s ease-in-out infinite;
    }
    .star-1 { animation-delay: 0s; transform-origin: 14px 18px; }
    .star-2 { animation-delay: 1.2s; transform-origin: 48px 17px; }
    .star-3 { animation-delay: 0.6s; transform-origin: 42px 50px; }
    .moon {
      animation: float-moon 6s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes float-moon {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-2px) rotate(-2deg); }
    }
  </style>
</svg>
