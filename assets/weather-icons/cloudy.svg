<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="cloud-back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="cloud-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Cloud -->
  <path class="cloud-b" d="M38 24 C38 19 42 15 47 15 C52 15 56 19 56 24 C56 24.3 56 24.7 55.9 25 C58 26.2 59.5 28.5 59.5 31 C59.5 34.9 56.4 38 52.5 38 L38.5 38 C35.2 38 32.5 35.3 32.5 32 C32.5 28.9 34.8 26.3 37.8 25.8 C37.9 25.2 38 24.6 38 24 Z" fill="url(#cloud-back)" opacity="0.75" />
  <!-- Foreground Cloud -->
  <path class="cloud-f" d="M19 28 C19 22.5 23.5 18 29 18 C34 18 38.2 21.7 38.9 26.5 C40.8 25.2 43 25 45 25.8 C48 27 50 30 50 33.5 C50 37.6 46.6 41 42.5 41 L19.5 41 C15.4 41 12 37.6 12 33.5 C12 29.8 14.7 26.7 18.3 26.2 C18.7 25.7 19 25.2 19 28 Z" fill="url(#cloud-front)" filter="url(#shadow)" />
  <style>
    .cloud-b {
      animation: float-back 6s ease-in-out infinite;
    }
    .cloud-f {
      animation: float-front 5s ease-in-out infinite;
    }
    @keyframes float-back {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes float-front {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(1.5px); }
    }
  </style>
</svg>
